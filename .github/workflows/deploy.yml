name: Deploy Hexo Blog

on:
  push:
    branches: [source]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: Restore file modification times
        run: |
          git ls-files | while read file; do
            if echo "$file" | grep -q '^source/_posts/.*\.md$'; then
              # Article files: only use HEAD date if content actually changed
              if git diff --ignore-space-at-eol HEAD~1 HEAD -- "$file" 2>/dev/null | grep -q '^[-+]'; then
                ts=$(git log -1 --format='%aI' -- "$file")
              else
                ts=$(git log --skip=1 -1 --format='%aI' -- "$file" 2>/dev/null || true)
              fi
            else
              ts=$(git log -1 --format='%aI' -- "$file" 2>/dev/null || true)
            fi
            [ -n "$ts" ] && touch -d "$ts" "$file" || true
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Generate static files
        run: |
          rm -f node_modules/hexo-theme-butterfly/source/img/favicon.ico
          npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main
