name: Deploy Hexo Blog

on:
  push:
    branches: [source]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: Restore file modification times
        run: |
          git ls-files | while read file; do
            if echo "$file" | grep -q '^source/_posts/.*\.md$'; then
              # For article files: find the last commit that actually changed content
              ts=""
              for commit in $(git log --format='%H' -20 -- "$file"); do
                parent=$(git rev-parse "$commit~1" 2>/dev/null) || continue
                if git diff --ignore-space-at-eol "$parent" "$commit" -- "$file" 2>/dev/null | grep -q '^[-+]'; then
                  ts=$(git log -1 --format='%aI' "$commit")
                  break
                fi
              done
              [ -z "$ts" ] && ts=$(git log -1 --format='%aI' -- "$file" 2>/dev/null || true)
            else
              ts=$(git log -1 --format='%aI' -- "$file" 2>/dev/null || true)
            fi
            [ -n "$ts" ] && touch -d "$ts" "$file" || true
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Patch translations then generate
        run: |
          rm -f node_modules/hexo-theme-butterfly/source/img/favicon.ico
          # 1. Add page.archives right after page.articles in zh-CN.yml
          sed -i '/^  articles: 全部文章$/a\  archives: 归档' node_modules/hexo-theme-butterfly/languages/zh-CN.yml
          # 2. Change search button text
          sed -i 's/^  title: 搜索$/  title: Search/' node_modules/hexo-theme-butterfly/languages/zh-CN.yml
          npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main
